<!DOCTYPE html>
<html lang="es" data-theme="dark" data-density="normal">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Bilbao2 - Ads Dashboard</title>
  <link rel="icon" href="assets/favicon-bilbao2.png"/>
  <link rel="stylesheet" href="styles.css"/>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <style>
    #loader {
      position: fixed; inset: 0;
      background: #0A0A0A;
      display: flex; align-items: center; justify-content: center;
      flex-direction: column; gap: 16px;
      z-index: 9999;
      transition: opacity 0.3s ease;
    }
    #loader.hidden { opacity: 0; pointer-events: none; }
    .loader-ring {
      width: 40px; height: 40px;
      border: 3px solid rgba(233,255,123,0.15);
      border-top-color: #E9FF7B;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    .loader-text {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #6A6A6A;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="loader">
    <div class="loader-ring"></div>
    <div class="loader-text">Cargando datos…</div>
  </div>
  <div id="root"></div>
  <script src="data.js"></script>
  <script type="text/babel" src="components/primitives.jsx"></script>
  <script type="text/babel" src="components/charts.jsx"></script>
  <script type="text/babel" src="components/chrome.jsx"></script>
  <script type="text/babel" src="components/executive.jsx"></script>
  <script type="text/babel" src="components/detail.jsx"></script>
  <script type="text/babel" src="components/app.jsx"></script>
</body>
</html>
